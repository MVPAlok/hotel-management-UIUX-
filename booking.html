<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Reserve Your Stay - Aurum Grove Hotel & Suites</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#D4AF37", "primary-light": "#E8C86B", "primary-dark": "#B5952F",
                        "background-light": "#FAFAFA", "background-alt": "#F3F0E9", "surface-light": "#FFFFFF",
                        "text-dark": "#1A1A1A", "text-muted": "#5C5C5C", "border-soft": "#E5E5E5"
                    },
                    fontFamily: { "sans": ["Inter", "sans-serif"], "serif": ["Playfair Display", "serif"] },
                    boxShadow: { "soft": "0 10px 40px -10px rgba(0,0,0,0.05)", "glow": "0 0 20px rgba(212, 175, 55, 0.3)" }
                },
            },
        }
    </script>
    
    <!-- React, Babel, html2pdf -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FAFAFA; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #B5952F; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-background-light text-text-dark font-sans antialiased overflow-x-hidden selection:bg-primary-light selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useContext, createContext, useReducer, useEffect, useRef } = React;

        const BookingContext = createContext();

        const bookingReducer = (state, action) => {
            switch(action.type) {
                case 'SET_STAY_DETAILS': return { ...state, stayDetails: { ...state.stayDetails, ...action.payload } };
                case 'SET_SELECTED_ROOM': return { ...state, selectedRoom: action.payload };
                case 'TOGGLE_ADDON':
                    const exists = state.selectedAddons.find(a => a.id === action.payload.id);
                    if (exists) return { ...state, selectedAddons: state.selectedAddons.filter(a => a.id !== action.payload.id) };
                    return { ...state, selectedAddons: [...state.selectedAddons, action.payload] };
                case 'SET_GUEST_DETAILS': return { ...state, guestDetails: { ...state.guestDetails, ...action.payload } };
                case 'SET_PAYMENT': return { ...state, paymentDetails: { ...state.paymentDetails, ...action.payload } };
                case 'SET_CURRENT_STEP': return { ...state, currentStep: action.payload };
                case 'SET_CONFIRMATION': return { ...state, confirmation: action.payload };
                case 'SET_LOADING': return { ...state, isLoading: action.payload };
                default: return state;
            }
        };

        const initialState = {
            currentStep: 1,
            stayDetails: { checkIn: '', checkOut: '', adults: 2, children: 0 },
            selectedRoom: null, selectedAddons: [],
            guestDetails: { firstName: '', lastName: '', email: '', phone: '' },
            paymentDetails: { cardNumber: '', expiry: '', cvc: '' },
            confirmation: null, isLoading: false,
        };

        const BookingProvider = ({ children }) => {
            const [state, dispatch] = useReducer(bookingReducer, initialState);
            return <BookingContext.Provider value={{ state, dispatch }}>{children}</BookingContext.Provider>;
        };

        const useBooking = () => useContext(BookingContext);

        const roomsDatabase = [
            { id: 1, name: 'Heritage Suite', capacity: 2, price: 350, size: 45, amenities: ['King Bed', 'Lake View', 'Bathtub', 'Wifi'], image: 'images/room-heritage.png' },
            { id: 2, name: 'Royal Villa', capacity: 4, price: 650, size: 85, amenities: ['King Bed', 'Private Pool', 'Room Service', 'Wifi'], image: 'images/room-villa.png' },
            { id: 3, name: 'Courtyard Room', capacity: 2, price: 280, size: 35, amenities: ['Queen Bed', 'Garden View', 'Wifi', 'Balcony'], image: 'images/room-courtyard.png' },
            { id: 4, name: 'Palace View Double', capacity: 4, price: 420, size: 55, amenities: ['2 Queen Beds', 'Palace View', 'Wifi', 'Desk'], image: 'images/room-palace.png' }
        ];

        const addonsDatabase = [
            { id: 'breakfast', name: 'Royal Breakfast Buffet', price: 45, icon: 'restaurant', type: 'per_person_per_night', desc: 'Daily access to our lavish morning buffet overlooking the lake.' },
            { id: 'spa', name: 'Couples Ayurvedic Spa', price: 200, icon: 'spa', type: 'once', desc: 'A 90-minute signature couples massage session.' },
            { id: 'pickup', name: 'Airport Chauffeur', price: 80, icon: 'airport_shuttle', type: 'once', desc: 'Private luxury sedan transfer from Udaipur Airport.' },
            { id: 'early', name: 'Early Check-in', price: 50, icon: 'schedule', type: 'once', desc: 'Guaranteed room access from 10:00 AM.' }
        ];

        const BookingHeader = () => (
            <div class="bg-white border-b border-border-soft sticky top-0 z-50">
                <div class="max-w-[1280px] mx-auto px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3 text-text-dark cursor-pointer hover:opacity-80" onClick={() => window.location.href = '/'}>
                        <div class="text-primary"><span class="material-symbols-outlined text-4xl">local_florist</span></div>
                        <h2 class="font-serif text-2xl font-bold tracking-tight">Aurum Grove</h2>
                    </div>
                    <a href="/" class="text-text-muted hover:text-primary transition-colors text-sm font-medium uppercase tracking-widest">Return Home</a>
                </div>
            </div>
        );

        const StepIndicator = () => {
            const { state } = useBooking();
            const steps = ['Dates', 'Suites', 'Add-ons', 'Checkout', 'Done'];
            return (
                <div class="flex items-center justify-between mb-12 relative">
                    <div class="absolute top-1/2 left-0 w-full h-0.5 bg-border-soft -z-10"></div>
                    <div class="absolute top-1/2 left-0 h-0.5 bg-primary -z-10 transition-all duration-500" style={{ width: `${((state.currentStep - 1) / 4) * 100}%` }}></div>
                    {steps.map((label, index) => {
                        const stepNum = index + 1;
                        const isPast = stepNum < state.currentStep;
                        const isActive = stepNum === state.currentStep;
                        return (
                            <div key={stepNum} class="flex flex-col items-center">
                                <div class={`w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 transition-all duration-300 ${isActive ? 'bg-primary border-primary text-white shadow-glow transform scale-110' : isPast ? 'bg-primary border-primary text-white' : 'bg-white border-border-soft text-text-muted'}`}>
                                    {isPast ? <span class="material-symbols-outlined text-lg">check</span> : stepNum}
                                </div>
                                <span class={`absolute top-12 text-[10px] font-bold uppercase tracking-widest ${isActive || isPast ? 'text-text-dark' : 'text-text-muted'}`}>{label}</span>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const OrderSummary = () => {
            const { state } = useBooking();
            const { stayDetails, selectedRoom, selectedAddons, currentStep } = state;
            if (currentStep === 1 || currentStep === 5) return null;

            const nights = stayDetails.checkIn && stayDetails.checkOut ? Math.max(1, Math.ceil((new Date(stayDetails.checkOut) - new Date(stayDetails.checkIn)) / (1000 * 60 * 60 * 24))) : 0;
            const guests = parseInt(stayDetails.adults) + parseInt(stayDetails.children);
            
            let roomTotal = selectedRoom ? selectedRoom.price * nights : 0;
            let addonsTotal = 0;
            selectedAddons.forEach(addon => addonsTotal += addon.type === 'once' ? addon.price : addon.price * guests * nights);

            const subtotal = roomTotal + addonsTotal;
            const tax = subtotal * 0.18;
            const total = subtotal + tax;

            return (
                <div class="bg-surface-light border border-border-soft p-6 shadow-soft sticky top-24 fade-in">
                    <h3 class="font-serif text-xl font-bold text-text-dark mb-6">Reservation Summary</h3>
                    
                    <div class="mb-6 pb-6 border-b border-border-soft space-y-4">
                        <div>
                            <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-1">Dates</p>
                            <p class="text-sm font-medium text-text-dark">
                                {stayDetails.checkIn ? new Date(stayDetails.checkIn).toLocaleDateString() : '---'} - {stayDetails.checkOut ? new Date(stayDetails.checkOut).toLocaleDateString() : '---'}
                                <span class="text-text-muted ml-2">({nights} Nights)</span>
                            </p>
                        </div>
                        <div>
                            <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-1">Guests</p>
                            <p class="text-sm font-medium text-text-dark">{guests} Guests ({stayDetails.adults} Adults, {stayDetails.children} Children)</p>
                        </div>
                    </div>

                    <div class="space-y-3 mb-6 pb-6 border-b border-border-soft">
                        <div class="flex justify-between text-sm">
                            <span class="text-text-muted">{selectedRoom ? selectedRoom.name : 'No room selected'}</span>
                            <span class="text-text-dark font-medium">${roomTotal.toFixed(2)}</span>
                        </div>
                        {selectedAddons.map(addon => (
                            <div key={addon.id} class="flex justify-between text-sm">
                                <span class="text-text-muted">{addon.name}</span>
                                <span class="text-text-dark font-medium">${(addon.type === 'once' ? addon.price : addon.price * guests * nights).toFixed(2)}</span>
                            </div>
                        ))}
                    </div>

                    <div class="space-y-2 mb-6 pb-6 border-b border-border-soft">
                        <div class="flex justify-between text-sm">
                            <span class="text-text-muted">Subtotal</span>
                            <span class="text-text-dark font-medium">${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-text-muted">Taxes & Fees (18%)</span>
                            <span class="text-text-dark font-medium">${tax.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-end mb-6">
                        <span class="text-text-dark font-bold">Total</span>
                        <span class="text-primary font-serif italic text-3xl">${total.toFixed(2)}</span>
                    </div>
                </div>
            );
        };

        const StepDates = () => {
            const { state, dispatch } = useBooking();
            const { stayDetails } = state;
            const [error, setError] = useState('');

            const handleChange = (field, value) => dispatch({ type: 'SET_STAY_DETAILS', payload: { [field]: value } });

            const handleNext = () => {
                if (!stayDetails.checkIn || !stayDetails.checkOut) return setError('Please select your travel dates.');
                if (stayDetails.checkOut <= stayDetails.checkIn) return setError('Check-out must be after check-in.');
                setError('');
                dispatch({ type: 'SET_CURRENT_STEP', payload: 2 });
            };
            const today = new Date().toISOString().split('T')[0];

            return (
                <div class="fade-in max-w-2xl mx-auto mt-8">
                    <div class="text-center mb-10">
                        <span class="text-primary font-bold text-sm uppercase tracking-widest mb-2 block">Step 1</span>
                        <h2 class="font-serif text-4xl font-bold text-text-dark">When will you be staying?</h2>
                    </div>
                    {error && <div class="bg-red-50 text-red-600 p-4 border border-red-200 text-sm mb-6 flex items-center gap-2"><span class="material-symbols-outlined">error</span> {error}</div>}
                    <div class="bg-surface-light border border-border-soft p-8 shadow-soft">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="flex flex-col">
                                <label class="text-xs font-bold text-text-muted uppercase tracking-widest mb-2">Check-in Date</label>
                                <input type="date" value={stayDetails.checkIn} min={today} onChange={(e) => handleChange('checkIn', e.target.value)} class="border-border-soft text-text-dark focus:border-primary focus:ring-1 focus:ring-primary p-3" />
                            </div>
                            <div class="flex flex-col">
                                <label class="text-xs font-bold text-text-muted uppercase tracking-widest mb-2">Check-out Date</label>
                                <input type="date" value={stayDetails.checkOut} min={stayDetails.checkIn || today} onChange={(e) => handleChange('checkOut', e.target.value)} class="border-border-soft text-text-dark focus:border-primary focus:ring-1 focus:ring-primary p-3" />
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                            <div class="flex flex-col">
                                <label class="text-xs font-bold text-text-muted uppercase tracking-widest mb-2">Adults</label>
                                <select value={stayDetails.adults} onChange={(e) => handleChange('adults', e.target.value)} class="border-border-soft text-text-dark focus:border-primary focus:ring-1 focus:ring-primary p-3 bg-white">
                                    {[1, 2, 3, 4, 5, 6].map(n => <option key={n} value={n}>{n}</option>)}
                                </select>
                            </div>
                            <div class="flex flex-col">
                                <label class="text-xs font-bold text-text-muted uppercase tracking-widest mb-2">Children (0-12 yrs)</label>
                                <select value={stayDetails.children} onChange={(e) => handleChange('children', e.target.value)} class="border-border-soft text-text-dark focus:border-primary focus:ring-1 focus:ring-primary p-3 bg-white">
                                    {[0, 1, 2, 3, 4].map(n => <option key={n} value={n}>{n}</option>)}
                                </select>
                            </div>
                        </div>
                        <button onClick={handleNext} class="w-full bg-primary hover:bg-primary-dark text-white font-bold uppercase tracking-widest text-sm py-4 transition-colors shadow-glow hover:shadow-lg">View Available Suites</button>
                    </div>
                </div>
            );
        };

        const StepSuites = () => {
            const { state, dispatch } = useBooking();
            const { selectedRoom, stayDetails } = state;
            const guests = parseInt(stayDetails.adults) + parseInt(stayDetails.children);
            const availableRooms = roomsDatabase.filter(r => r.capacity >= guests);

            const handleNext = () => {
                if (!selectedRoom) return alert('Please select a suite.');
                dispatch({ type: 'SET_CURRENT_STEP', payload: 3 });
            };

            return (
                <div class="fade-in">
                    <div class="mb-10">
                        <span class="text-primary font-bold text-sm uppercase tracking-widest mb-2 block">Step 2</span>
                        <h2 class="font-serif text-3xl font-bold text-text-dark">Select Your Suite</h2>
                    </div>
                    <div class="space-y-6 mb-8">
                        {availableRooms.map(room => (
                            <div key={room.id} class={`flex flex-col md:flex-row bg-surface-light border cursor-pointer transition-all ${selectedRoom?.id === room.id ? 'border-primary shadow-glow' : 'border-border-soft hover:border-primary/50'}`} onClick={() => dispatch({ type: 'SET_SELECTED_ROOM', payload: room })}>
                                <div class="md:w-1/3 h-48 md:h-auto relative overflow-hidden group">
                                    <img src={room.image} class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt={room.name} />
                                    {selectedRoom?.id === room.id && <div class="absolute inset-0 bg-primary/20 flex items-center justify-center backdrop-blur-[1px]"><span class="bg-white text-primary rounded-full p-2 material-symbols-outlined shadow-lg font-bold">check</span></div>}
                                </div>
                                <div class="p-6 md:w-2/3 flex flex-col justify-between">
                                    <div>
                                        <div class="flex justify-between items-start mb-2">
                                            <h3 class="font-serif text-2xl font-bold text-text-dark">{room.name}</h3>
                                            <div class="text-right">
                                                <span class="text-primary font-serif italic text-2xl block">${room.price}</span>
                                                <span class="text-xs text-text-muted uppercase tracking-widest">per night</span>
                                            </div>
                                        </div>
                                        <p class="text-sm text-text-muted mb-4">Up to {room.capacity} Guests • {room.size}m²</p>
                                        <div class="flex flex-wrap gap-4">
                                            {room.amenities.map(a => <span key={a} class="text-xs font-medium bg-background-light px-3 py-1 border border-border-soft text-text-dark">{a}</span>)}
                                        </div>
                                    </div>
                                    <div class="mt-6 text-right">
                                        <button class={`px-6 py-2 text-sm font-bold uppercase tracking-widest border transition-colors ${selectedRoom?.id === room.id ? 'bg-primary border-primary text-white shadow-glow' : 'border-text-dark text-text-dark hover:bg-text-dark hover:text-white'}`}>
                                            {selectedRoom?.id === room.id ? 'Selected' : 'Select Suite'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div class="flex gap-4">
                        <button onClick={() => dispatch({ type: 'SET_CURRENT_STEP', payload: 1 })} class="px-8 py-4 border border-text-dark text-text-dark font-bold uppercase tracking-widest text-sm hover:bg-text-dark hover:text-white transition-colors">Back</button>
                        <button onClick={handleNext} disabled={!selectedRoom} class="flex-1 bg-primary hover:bg-primary-dark text-white font-bold uppercase tracking-widest text-sm py-4 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Continue to Add-ons</button>
                    </div>
                </div>
            );
        };

        const StepAddons = () => {
            const { state, dispatch } = useBooking();
            const { selectedAddons } = state;
            return (
                <div class="fade-in">
                    <div class="mb-10">
                        <span class="text-primary font-bold text-sm uppercase tracking-widest mb-2 block">Step 3</span>
                        <h2 class="font-serif text-3xl font-bold text-text-dark">Enhance Your Stay</h2>
                        <p class="text-text-muted text-sm mt-2 font-light">Select optional upgrades for a more memorable experience.</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
                        {addonsDatabase.map(addon => {
                            const isSelected = selectedAddons.find(a => a.id === addon.id);
                            return (
                                <div key={addon.id} onClick={() => dispatch({ type: 'TOGGLE_ADDON', payload: addon })} class={`p-6 border cursor-pointer transition-all ${isSelected ? 'border-primary bg-primary/5 shadow-glow transform -translate-y-1' : 'border-border-soft bg-surface-light hover:border-primary/50 hover:shadow-soft'}`}>
                                    <div class="flex justify-between items-start mb-4">
                                        <span class={`material-symbols-outlined text-3xl ${isSelected ? 'text-primary' : 'text-text-muted'}`}>{addon.icon}</span>
                                        <div class={`w-6 h-6 rounded-full border flex items-center justify-center ${isSelected ? 'bg-primary border-primary text-white' : 'border-border-soft'}`}>
                                            {isSelected && <span class="material-symbols-outlined text-sm font-bold">check</span>}
                                        </div>
                                    </div>
                                    <h4 class="font-bold text-text-dark mb-1">{addon.name}</h4>
                                    <p class="text-xs text-text-muted mb-4 h-8">{addon.desc}</p>
                                    <p class="text-primary font-serif italic text-xl">
                                        ${addon.price} <span class="text-xs text-text-muted not-italic font-sans block">{addon.type === 'once' ? 'Total (One time)' : 'Per Person / Per Night'}</span>
                                    </p>
                                </div>
                            );
                        })}
                    </div>
                    <div class="flex gap-4">
                        <button onClick={() => dispatch({ type: 'SET_CURRENT_STEP', payload: 2 })} class="px-8 py-4 border border-text-dark text-text-dark font-bold uppercase tracking-widest text-sm hover:bg-text-dark hover:text-white transition-colors">Back</button>
                        <button onClick={() => dispatch({ type: 'SET_CURRENT_STEP', payload: 4 })} class="flex-1 bg-primary hover:bg-primary-dark text-white font-bold uppercase tracking-widest text-sm py-4 transition-colors shadow-glow hover:shadow-lg">Continue to Checkout</button>
                    </div>
                </div>
            );
        };

        const StepCheckout = () => {
            const { state, dispatch } = useBooking();
            const { guestDetails, paymentDetails, stayDetails, selectedRoom, selectedAddons, isLoading } = state;
            const [error, setError] = useState('');

            const handleGuest = (field, value) => dispatch({ type: 'SET_GUEST_DETAILS', payload: { [field]: value } });
            const handlePay = (field, value) => {
                let formatted = value;
                if (field === 'cardNumber') formatted = value.replace(/\s/g, '').replace(/(\d{4})/g, '$1 ').trim();
                if (field === 'expiry') {
                    formatted = value.replace(/\D/g, '');
                    if (formatted.length >= 2) formatted = formatted.slice(0, 2) + '/' + formatted.slice(2, 4);
                }
                dispatch({ type: 'SET_PAYMENT', payload: { [field]: formatted } });
            };

            const handleSubmit = () => {
                if (!guestDetails.firstName || !guestDetails.lastName || !guestDetails.email || !guestDetails.phone) return setError('Please fill in all guest details.');
                if (paymentDetails.cardNumber.length < 19 || paymentDetails.expiry.length < 5 || paymentDetails.cvc.length < 3) return setError('Please complete payment details.');
                
                setError('');
                dispatch({ type: 'SET_LOADING', payload: true });

                setTimeout(() => {
                    dispatch({ type: 'SET_LOADING', payload: false });
                    const nights = Math.ceil((new Date(stayDetails.checkOut) - new Date(stayDetails.checkIn)) / (1000 * 60 * 60 * 24));
                    const guests = parseInt(stayDetails.adults) + parseInt(stayDetails.children);
                    let addonsTotal = 0;
                    selectedAddons.forEach(addon => addonsTotal += addon.type === 'once' ? addon.price : addon.price * guests * nights);
                    const subtotal = (selectedRoom.price * nights) + addonsTotal;
                    const total = subtotal + (subtotal * 0.18);

                    dispatch({ type: 'SET_CONFIRMATION', payload: {
                        id: 'AG-' + Math.floor(Math.random() * 1000000),
                        name: guestDetails.firstName + ' ' + guestDetails.lastName,
                        email: guestDetails.email,
                        total: total
                    }});
                    dispatch({ type: 'SET_CURRENT_STEP', payload: 5 });
                }, 2000);
            };

            return (
                <div class="fade-in">
                    <div class="mb-8">
                        <span class="text-primary font-bold text-sm uppercase tracking-widest mb-2 block">Step 4</span>
                        <h2 class="font-serif text-3xl font-bold text-text-dark">Details & Payment</h2>
                    </div>
                    {error && <div class="bg-red-50 text-red-600 p-4 border border-red-200 text-sm mb-6 flex items-center gap-2"><span class="material-symbols-outlined">error</span> {error}</div>}
                    <div class="space-y-8">
                        <div class="bg-surface-light border border-border-soft p-6 shadow-soft">
                            <h3 class="font-serif text-xl font-bold text-text-dark mb-4 border-b border-border-soft pb-2">Guest Information</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <input type="text" placeholder="First Name *" value={guestDetails.firstName} onChange={e => handleGuest('firstName', e.target.value)} class="border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary" />
                                <input type="text" placeholder="Last Name *" value={guestDetails.lastName} onChange={e => handleGuest('lastName', e.target.value)} class="border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary" />
                                <input type="email" placeholder="Email Address *" value={guestDetails.email} onChange={e => handleGuest('email', e.target.value)} class="border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary" />
                                <input type="tel" placeholder="Phone Number *" value={guestDetails.phone} onChange={e => handleGuest('phone', e.target.value)} class="border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary" />
                            </div>
                        </div>
                        <div class="bg-surface-light border border-border-soft p-6 shadow-soft">
                            <div class="flex justify-between items-center border-b border-border-soft pb-2 mb-4">
                                <h3 class="font-serif text-xl font-bold text-text-dark">Payment Method</h3>
                                <div class="flex gap-2">
                                    <span class="material-symbols-outlined text-text-muted">credit_card</span>
                                    <span class="material-symbols-outlined text-text-muted">lock</span>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="md:col-span-2">
                                    <input type="text" placeholder="Card Number *" value={paymentDetails.cardNumber} maxLength="19" onChange={e => handlePay('cardNumber', e.target.value)} class="w-full border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary font-mono" />
                                </div>
                                <input type="text" placeholder="MM/YY *" value={paymentDetails.expiry} maxLength="5" onChange={e => handlePay('expiry', e.target.value)} class="border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary font-mono" />
                                <input type="text" placeholder="CVC *" value={paymentDetails.cvc} maxLength="4" onChange={e => handlePay('cvc', e.target.value)} class="border-border-soft p-3 focus:ring-1 focus:ring-primary focus:border-primary font-mono" />
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button onClick={() => dispatch({ type: 'SET_CURRENT_STEP', payload: 3 })} disabled={isLoading} class="px-8 py-4 border border-text-dark text-text-dark font-bold uppercase tracking-widest text-sm hover:bg-text-dark hover:text-white transition-colors disabled:opacity-50">Back</button>
                        <button onClick={handleSubmit} disabled={isLoading} class="flex-1 bg-primary hover:bg-primary-dark text-white font-bold uppercase tracking-widest text-sm py-4 transition-colors disabled:opacity-50 flex items-center justify-center gap-2 shadow-glow hover:shadow-lg">
                            {isLoading ? <span class="material-symbols-outlined animate-spin">refresh</span> : 'Complete Reservation'}
                        </button>
                    </div>
                </div>
            );
        };

        const StepConfirmation = () => {
            const { state } = useBooking();
            const { confirmation, stayDetails, selectedRoom, selectedAddons } = state;
            const receiptRef = useRef(null);

            const downloadPDF = () => {
                const element = receiptRef.current;
                const opt = {
                    margin:       1,
                    filename:     `Aurum_Grove_Reservation_${confirmation.id}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            return (
                <div class="fade-in max-w-3xl mx-auto mt-8 text-center">
                    <div class="mb-8">
                        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6 shadow-glow">
                            <span class="material-symbols-outlined text-5xl text-primary">check_circle</span>
                        </div>
                        <h2 class="font-serif text-4xl font-bold text-text-dark mb-4">Reservation Confirmed</h2>
                        <p class="text-text-muted text-lg font-light">Thank you, {confirmation.name}. We look forward to welcoming you to Aurum Grove.</p>
                    </div>

                    <div ref={receiptRef} class="bg-surface-light border border-border-soft p-8 text-left mb-10 shadow-soft relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-primary"></div>
                        <div class="flex justify-between items-end border-b border-border-soft pb-4 mb-6 mt-2">
                            <div>
                                <h3 class="font-serif text-2xl font-bold text-text-dark mb-1">Aurum Grove</h3>
                                <p class="text-xs font-bold uppercase tracking-widest text-text-muted">Confirmation #{confirmation.id}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-1">Total Paid</p>
                                <p class="font-serif italic text-3xl text-primary">${confirmation.total.toFixed(2)}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-6">
                            <div>
                                <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-1">Check-in</p>
                                <p class="text-sm font-medium">{new Date(stayDetails.checkIn).toLocaleDateString()}</p>
                            </div>
                            <div>
                                <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-1">Check-out</p>
                                <p class="text-sm font-medium">{new Date(stayDetails.checkOut).toLocaleDateString()}</p>
                            </div>
                            <div class="md:col-span-2">
                                <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-1">Suite</p>
                                <p class="text-sm font-medium flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary text-sm">bed</span>
                                    {selectedRoom.name}
                                </p>
                            </div>
                        </div>
                        
                        {selectedAddons.length > 0 && (
                            <div class="border-t border-border-soft pt-4">
                                <p class="text-xs font-bold uppercase tracking-widest text-text-muted mb-3">Included Add-ons</p>
                                <ul class="grid grid-cols-1 md:grid-cols-2 gap-2">
                                    {selectedAddons.map(addon => (
                                        <li key={addon.id} class="text-sm font-medium flex items-center gap-2">
                                            <span class="material-symbols-outlined text-primary text-sm">{addon.icon}</span>
                                            {addon.name}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                        <div class="mt-8 pt-4 border-t border-border-soft text-center text-xs text-text-muted italic">
                            Thank you for booking with Aurum Grove Hotel & Suites. Udaipur, India.
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row justify-center gap-4">
                        <a href="/" class="px-8 py-4 bg-text-dark text-white font-bold uppercase tracking-widest text-sm hover:bg-black transition-colors shadow-lg">Return to Home</a>
                        <button onClick={downloadPDF} class="px-8 py-4 border border-text-dark text-text-dark font-bold uppercase tracking-widest text-sm hover:bg-text-dark hover:text-white transition-colors flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">download</span> Download PDF
                        </button>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const { state } = useBooking();
            const { currentStep } = state;
            useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [currentStep]);

            return (
                <div class="min-h-screen bg-background-alt pb-20">
                    <BookingHeader />
                    <div class="max-w-[1280px] mx-auto px-6 pt-12">
                        {currentStep < 5 && <StepIndicator />}
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                            <div class={currentStep === 1 || currentStep === 5 ? "lg:col-span-3" : "lg:col-span-2"}>
                                {currentStep === 1 && <StepDates />}
                                {currentStep === 2 && <StepSuites />}
                                {currentStep === 3 && <StepAddons />}
                                {currentStep === 4 && <StepCheckout />}
                                {currentStep === 5 && <StepConfirmation />}
                            </div>
                            {(currentStep > 1 && currentStep < 5) && (
                                <div class="hidden lg:block lg:col-span-1"><OrderSummary /></div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BookingProvider><MainApp /></BookingProvider>);
    </script>
</body>
</html>
